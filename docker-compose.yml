services:
  backend:
    build:
      context: ./backend
    env_file: .env
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - elasticsearch

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-8}
    env_file: .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
      - elasticsearch

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ppt
      POSTGRES_PASSWORD: ppt
      POSTGRES_DB: ppt_hunter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  elastic_data:
